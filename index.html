<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- bootstrap js and css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Bootstrap demo</title>
  </head>
  <body>
    <header>
        <nav class="navbar bg-dark navbar-expand-lg border-bottom border-body" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
            <img src="img/duck_2247442.png" alt="" width="60" height="60">
          </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Catalogo Libri</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Anagrafica Utenti</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Storico Prestiti</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Help</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input class="form-control me-2" type="search" placeholder="Cerca..." aria-label="Search"/>
              <button class="btn btn-outline-light" type="submit">Cerca</button>
            </form>
    </div>
  </div>
</nav>
    </header>
    <div class="container my-3">
        <h1>
            Nuovo Libro
        </h1>
    </div>
    <div class="container">
        <form action="">
            <div class="row">
                <div class="col-6">
                    <label for="autorName" class="form-label fw-bold">
                        Nome Autore
                    </label>
                    <input type="text" class="form-control" id="autorName" placeholder="Inserisci il nome dell'autore">
                </div>
                <div class="col-6">
                    <label for="autorSurname" class="form-label fw-bold">
                        Cognome Autore
                    </label>
                    <input type="text" class="form-control" id="autorSurname" placeholder="Inserisci il cognome dell'autore">
                </div>
            </div>
        </form>
    </div>
    <div class="container mt-4">
        <div class="row">
            <form action="">
                <div class="col-12">
                    <label for="title" class="form-label fw-bold">
                        Titolo
                    </label>
                    <input type="text" class="form-control" id="title" placeholder="Inserisci il titolo del libro">
                </div>
            </form>
        </div>
    </div>
    <div class="container">
        <form action="">
            <div class="row row-cols-lg-3">
                <div class="mt-4">
                    <label for="genere" class="form-label fw-bold">Genere</label>
                    <select class="form-select" aria-label="Default select example">
                        <option selected disabled>Scegli il genere</option>
                        <option value="Giallo">Giallo</option>
                        <option value="Thriller">Thriller</option>
                        <option value="Romanzo">Romanzo</option>
                    </select>
                </div>
                <div class="mt-4">
                    <label for="pubblicationYear" class="form-label fw-bold">
                        Anno di Pubblicazione
                    </label>
                    <input type="text" class="form-control" id="pubblicationYear" placeholder="Inserisci l'anno">
                </div>
                <div class="mt-4">
                    <label for="codeISBN" class="form-label fw-bold">
                        ISBN#
                    </label>
                    <input type="text" class="form-control" id="codeISBN" placeholder="Inserisci il codice ISBN#">
                </div>
            </div>
        </form>
    </div>
    <div class="container my-5"> 
        <hr class="col-12">
    </div>

  </body>
</html>
